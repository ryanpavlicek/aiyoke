name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
      - name: Set up Node.js without release cache
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache: false
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: "1.97.1"
          components: rustfmt
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Match tag, package, repository, and changelog
        run: node scripts/verify-release-version.mjs "${GITHUB_REF_NAME}"
      - name: Run complete TypeScript gate
        run: pnpm check
      - name: Validate generated native runtimes
        run: pnpm test:runtimes
      - name: Validate generated framework adapters
        run: pnpm test:frameworks
      - name: Validate pinned target clients and artifact contracts
        run: pnpm test:target-clients

  build:
    name: Build, verify, and attest exact artifact
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out exact tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 11.7.0
      - name: Set up Node.js without release cache
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Resolve release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Build once
        run: pnpm build
      - name: Pack without rebuilding
        run: |
          mkdir release
          npm pack --ignore-scripts --pack-destination release
      - name: Validate and install the exact tarball
        run: node scripts/validate-package.mjs "release/aiyoke-${GITHUB_REF_NAME#v}.tgz"
      - name: Create SHA-256 checksum
        run: node scripts/release-checksum.mjs create "release/aiyoke-${GITHUB_REF_NAME#v}.tgz"
      - name: Generate SPDX JSON SBOM for the tarball
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: release/aiyoke-${{ steps.version.outputs.version }}.tgz
          format: spdx-json
          output-file: release/aiyoke-${{ steps.version.outputs.version }}.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest build provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/aiyoke-${{ steps.version.outputs.version }}.tgz
      - name: Attest SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: release/aiyoke-${{ steps.version.outputs.version }}.tgz
          sbom-path: release/aiyoke-${{ steps.version.outputs.version }}.spdx.json
      - name: Upload immutable release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-release-${{ github.ref_name }}
          path: release/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish approved release
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out exact tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Download exact attested release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-release-${{ github.ref_name }}
          path: release
      - name: Verify artifact checksum
        run: node scripts/release-checksum.mjs verify "release/aiyoke-${GITHUB_REF_NAME#v}.tgz.sha256"
      - name: Publish exact tarball with npm OIDC provenance
        run: npm publish "./release/aiyoke-${GITHUB_REF_NAME#v}.tgz" --access public
      - name: Verify registry version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          for attempt in {1..12}; do
            published="$(npm view "aiyoke@${version}" version 2>/dev/null || true)"
            if [[ "${published}" == "${version}" ]]; then
              exit 0
            fi
            if [[ "${attempt}" -eq 12 ]]; then
              echo "aiyoke@${version} was not visible after registry propagation retries" >&2
              exit 1
            fi
            sleep 10
          done
      - name: Create GitHub release with checksums and SBOM
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" release/*
          --verify-tag --generate-notes --title "Aiyoke ${GITHUB_REF_NAME#v}"
