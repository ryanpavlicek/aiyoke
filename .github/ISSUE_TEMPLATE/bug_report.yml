name: Bug report
description: Report a reproducible defect in aiyoke.
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the smallest spec, workspace shape, and command that reproduces the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aiyoke version
      placeholder: 0.3.2
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Node and pnpm versions
      placeholder: Node 22.x, pnpm 11.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs (redact secrets)
      render: text
